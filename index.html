<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paolo Iacovelli — (copy)writer</title>
  <style>
    @font-face {
      font-family: 'Catallina';
      src: url('fonts/Catallina.otf') format('opentype');
    }
    @font-face {
      font-family: 'MostraNuova';
      src: url('fonts/MostraNuova-Bold.ttf') format('truetype');
      font-weight: normal;
    }
    @font-face {
      font-family: 'TenorSans';
      src: url('fonts/TenorSans-Regular.ttf') format('truetype');
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue: #3754BF;
      --chartreuse: #D1FF66;
      --orange: #FFA47A;
    }

    html { height: 100%; }

    body {
      background: var(--blue);
      color: var(--chartreuse);
      font-family: 'TenorSans', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ─── INTRO OVERLAY ─────────────────────────────── */
    #intro-overlay {
      position: fixed;
      inset: 0;
      background: var(--blue);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #intro-center {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    #letter-stage {
      font-family: 'Catallina', serif;
      font-size: clamp(2.5rem, 7vw, 8rem);
      color: var(--orange);
      white-space: nowrap;
      line-height: 1;
      display: block;
      letter-spacing: 0.02em;
      font-feature-settings: "liga" 1;
    }

    #letter-stage span {
      display: inline-block;
    }

    #intro-sub {
      font-family: 'TenorSans', sans-serif;
      font-size: clamp(1.094rem, 2.031vw, 1.563rem);
      color: #D0DBFF;
      letter-spacing: 0.234em;
      transform: scaleX(1.1);
      transform-origin: left center;
      margin-top: 0.55em;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    #intro-sub.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* ─── HEADER ─────────────────────────────────────── */
    #main-header {
      padding: 2.5rem 4rem 1.8rem;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      border-bottom: 1px solid var(--chartreuse);
      gap: 2rem;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #main-header.show { opacity: 1; }

    .logo {
      display: flex;
      flex-direction: column;
      line-height: 1;
      flex-shrink: 0;
    }

    .logo-name {
      font-family: 'Catallina', serif;
      font-size: clamp(2rem, 4.2vw, 4rem);
      color: var(--orange);
      letter-spacing: 0.02em;
      white-space: nowrap;
      font-feature-settings: "liga" 1;
    }

    .ll-lig {
      font-feature-settings: "liga" 1, "dlig" 1;
    }

    .logo-sub {
      font-family: 'TenorSans', sans-serif;
      font-size: clamp(1.016rem, 1.72vw, 1.406rem);
      color: #D0DBFF;
      letter-spacing: 0.234em;
      display: inline-block;
      transform: scaleX(1.1);
      transform-origin: left center;
      margin-top: 0.45rem;
    }

    /* ─── HEADER RIGHT ───────────────────────────────── */
    .header-right {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 1rem;
      padding-bottom: 0.2rem;
      opacity: 0;
    }

    .social-links {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .social-links a {
      display: flex;
      align-items: center;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    .social-links a:hover { opacity: 1; }
    .social-links svg { width: 18px; height: 18px; fill: var(--chartreuse); }

    nav { display: flex; gap: 2.5rem; }

    nav a {
      font-family: 'TenorSans', sans-serif;
      font-size: clamp(0.7rem, 1vw, 0.9rem);
      color: var(--chartreuse);
      text-decoration: none;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      white-space: nowrap;
      position: relative;
      transition: opacity 0.2s;
    }

    nav a::after {
      content: '';
      position: absolute;
      bottom: -3px; left: 0;
      width: 0; height: 1px;
      background: var(--chartreuse);
      transition: width 0.25s ease;
    }

    nav a:hover { opacity: 0.7; }
    nav a:hover::after { width: 100%; }

    /* ─── MAIN ───────────────────────────────────────── */
    main {
      flex: 1;
      padding: 0 4rem 5rem;
      opacity: 0;
      transition: opacity 0.6s ease;
    }

    main.show { opacity: 1; }

    .section-label {
      font-family: 'TenorSans', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--chartreuse);
      opacity: 0.55;
      padding: 2.5rem 0 1.5rem;
      border-bottom: 1px solid rgba(209,255,102,0.15);
    }

    .project-list { list-style: none; }

    .project-item {
      display: grid;
      grid-template-columns: 3rem 1fr auto;
      align-items: baseline;
      gap: 0 2rem;
      padding: 2rem 0;
      border-bottom: 1px solid rgba(209,255,102,0.15);
      text-decoration: none;
      color: inherit;
    }

    .project-item:hover .project-title { letter-spacing: 0.06em; }
    .project-item:hover .project-arrow { transform: translateX(6px); }

    .project-number {
      font-family: 'TenorSans', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      color: var(--chartreuse);
      opacity: 0.4;
      align-self: center;
    }

    .project-body { display: flex; flex-direction: column; gap: 0.4rem; }

    .project-title {
      font-family: 'MostraNuova', serif;
      font-weight: normal;
      font-variant: small-caps;
      font-size: clamp(2rem, 5vw, 4.5rem);
      color: var(--chartreuse);
      line-height: 1;
      letter-spacing: 0.02em;
      transition: letter-spacing 0.3s ease;
    }

    .project-meta {
      font-family: 'TenorSans', sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--chartreuse);
      opacity: 0.5;
    }

    .project-arrow {
      font-size: 1.2rem;
      color: var(--chartreuse);
      opacity: 0.6;
      transition: transform 0.3s ease;
      align-self: center;
    }

    /* ─── FOOTER ─────────────────────────────────────── */
    footer {
      padding: 1.5rem 4rem;
      border-top: 1px solid rgba(209,255,102,0.15);
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      opacity: 0;
      transition: opacity 0.6s ease 0.2s;
    }

    footer.show { opacity: 1; }

    .footer-left { display: flex; flex-direction: column; gap: 0.4rem; }

    footer p {
      font-family: 'TenorSans', sans-serif;
      font-size: 0.7rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--chartreuse);
      opacity: 0.35;
    }

    .footer-social { display: flex; gap: 1rem; align-items: center; }

    .footer-social a {
      display: flex;
      align-items: center;
      opacity: 0.35;
      transition: opacity 0.2s;
    }

    .footer-social a:hover { opacity: 0.7; }
    .footer-social svg { width: 15px; height: 15px; fill: var(--chartreuse); }

    .footer-location { text-align: right; }

    /* ─── RESPONSIVE ─────────────────────────────────── */

    /* Tablet (768px) — reduce horizontal padding, keep desktop layout */
    @media (max-width: 768px) {
      #main-header { padding: 2rem 2.5rem 1.5rem; }
      main { padding: 0 2.5rem 4rem; }
      footer { padding: 1.5rem 2.5rem; }
    }

    /* Mobile (700px) — stack layout, tighten spacing */
    @media (max-width: 700px) {
      #letter-stage { font-size: clamp(2.5rem, 9vw, 8rem); }
      #main-header { flex-direction: column; align-items: flex-start; gap: 1.5rem; padding: 2rem 1.5rem 1.5rem; }
      .header-right { align-items: flex-start; }
      main { padding: 0 1.5rem 4rem; }
      footer { padding: 1.5rem; grid-template-columns: 1fr; gap: 1rem; }
      .project-item { grid-template-columns: 2.5rem 1fr; gap: 0 1rem; }
      .project-arrow { display: none; }
      nav { gap: 1.5rem; }
    }

    /* ─── BACK TO TOP ────────────────────────────────── */
    #back-to-top {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: var(--chartreuse);
      color: var(--blue);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      z-index: 50;
      pointer-events: none;
    }
    #back-to-top.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }
    #back-to-top:hover { opacity: 0.8; }
  </style>
</head>

<script>
(function () {
  'use strict';

  // ── Config ─────────────────────────────────────────────────────────────────
  // "ciAo" → "PAolO iAcoveLLi"
  // TARGET indices: P=0 A=1 o=2 l=3 O=4 ' '=5 i=6 A=7 c=8 o=9 v=10 e=11 L=12 L=13 i=14
  const SOURCE = 'ciAo';
  const TARGET = 'PAolO iAcoveLLi';
  let stageFS = '40px'; // set from computed style in phase1 after fonts load

  // SOURCE "ciAo":  c=0  i=1  A=2  o=3
  // TARGET indices: P=0 A=1 o=2 l=3 O=4 ' '=5 i=6 A=7 c=8 o=9 v=10 e=11 l=12 l=13 i=14
  // i(1) and A(2) are already at their destinations (tgtRects[6] and tgtRects[7])
  // Only c(0) and o(3) physically travel.
  const MOVER_O_DELAY  = 0;    // ms: when o starts moving
  const MOVER_O_DUR    = 520;
  const MOVER_C_DELAY  = 480;  // ms: when c starts (overlaps o landing)
  const MOVER_C_DUR    = 520;
  const FILL_START     = 780;  // ms: remaining letters begin appearing
  const FILL_STEP      = 72;   // ms between each letter
  const FILL_DUR       = 280;

  const $overlay     = document.getElementById('intro-overlay');
  const $center      = document.getElementById('intro-center');
  const $stage       = document.getElementById('letter-stage');
  const $sub         = document.getElementById('intro-sub');
  const $header      = document.getElementById('main-header');
  const $headerRight = document.querySelector('.header-right');
  const $logo        = document.querySelector('.logo');
  const $main        = document.querySelector('main');
  const $footer      = document.querySelector('footer');

  document.body.style.overflow = 'hidden';

  // ── Helpers ─────────────────────────────────────────────────────────────────
  const wait = ms => new Promise(res => setTimeout(res, ms));
  const raf2 = () => new Promise(res => requestAnimationFrame(() => requestAnimationFrame(res)));

  function fillStage(text, visible) {
    $stage.innerHTML = '';
    for (const ch of text) {
      const s = document.createElement('span');
      s.textContent = ch === ' ' ? '\u00A0' : ch;
      s.style.opacity = visible ? '1' : '0';
      $stage.appendChild(s);
    }
  }

  function stageRects() {
    return Array.from($stage.children).map(s => {
      const r = s.getBoundingClientRect();
      return { left: r.left, top: r.top };
    });
  }

  function makeGhost(ch, rect, opacity) {
    const s = document.createElement('span');
    s.textContent = ch === ' ' ? '\u00A0' : ch;
    s.style.cssText = [
      'position:fixed',
      `left:${rect.left}px`,
      `top:${rect.top}px`,
      "font-family:'Catallina',serif",
      `font-size:${stageFS}`,
      'color:#FFA47A',
      'white-space:nowrap',
      'line-height:1',
      'letter-spacing:0.02em',
      'pointer-events:none',
      'z-index:200',
      `opacity:${opacity}`,
    ].join(';');
    return s;
  }

  // ── Phase 1 ──────────────────────────────────────────────────────────────────
  async function phase1() {
    await document.fonts.ready;
    // Capture the actual computed stage font-size (respects clamp + media queries)
    // so ghost spans match exactly at every viewport width
    stageFS = getComputedStyle($stage).fontSize;

    // ── Size intro-sub to match the logo-sub/logo-name ratio at this viewport ──
    // Both use different clamp() curves so the ratio drifts; computing it from
    // actual px values guarantees they stay proportional at every breakpoint.
    {
      const stagePxNow   = parseFloat(stageFS);
      const logoNamePx   = parseFloat(getComputedStyle($logo.querySelector('.logo-name')).fontSize);
      const logoSubPx    = parseFloat(getComputedStyle($logo.querySelector('.logo-sub')).fontSize);
      $sub.style.fontSize = (stagePxNow * logoSubPx / logoNamePx) + 'px';
    }

    // ── Measure target layout with LL ligature already in place ──
    // The dlig LL glyph is a different width than L+L, which — because the text
    // is centered — shifts ALL character positions. We must measure after the
    // merge so every ghost lands on its true final position.
    fillStage(TARGET, false);
    {
      const tspans = Array.from($stage.children);
      const tempLL = document.createElement('span');
      tempLL.textContent = 'LL';
      tempLL.style.display = 'inline-block';
      tempLL.style.fontFeatureSettings = '"liga" 1, "dlig" 1';
      tempLL.style.letterSpacing = '0';
      $stage.insertBefore(tempLL, tspans[12]);
      tspans[12].remove();
      tspans[13].remove();
    }
    await raf2();
    // Stage now has 14 children. Reconstruct the 15-slot tgtRects array:
    //   children[0..11]  → tgtRects[0..11]
    //   children[12]     → tgtRects[12]  (LL left edge)
    //   (index 13 unused — insert placeholder equal to [12])
    //   children[13]     → tgtRects[14]  (final 'i')
    const tgtRects = Array.from($stage.children).map(s => {
      const r = s.getBoundingClientRect();
      return { left: r.left, top: r.top };
    });
    tgtRects.splice(13, 0, tgtRects[12]); // placeholder for unused index 13

    // ── Measure ciAo natural layout (invisible, centered) ──
    fillStage(SOURCE, false);
    await raf2();
    const ciaoNatural = stageRects();

    // ── Compute offset so SOURCE[1]=i lands on tgtRects[6], SOURCE[2]=A on tgtRects[7] ──
    // Same font/size means i→A kerning is identical in both strings, so one offset aligns both.
    const offX = tgtRects[6].left - ciaoNatural[1].left;
    const offY = tgtRects[6].top  - ciaoNatural[1].top;

    // ── Create ciAo ghost spans at offset positions and show them ──
    // c is left of i, i is at tgt[6], A is at tgt[7], o is right of A
    const ciaoGhosts = SOURCE.split('').map((ch, si) => {
      const ghost = makeGhost(ch, {
        left: ciaoNatural[si].left + offX,
        top:  ciaoNatural[si].top  + offY,
      }, 1);
      document.body.appendChild(ghost);
      return ghost;
    });

    // Hide stage — ghosts take over the display
    $stage.style.visibility = 'hidden';

    // Pause so user reads "ciAo" with i/A anchored at their final spots
    await wait(1500);

    // ── Animate o (ciaoGhosts[3]) → tgtRects[9] ──
    const oStart = { left: ciaoNatural[3].left + offX, top: ciaoNatural[3].top + offY };
    ciaoGhosts[3].animate(
      [{ transform: 'translate(0,0)' },
       { transform: `translate(${tgtRects[9].left - oStart.left}px,${tgtRects[9].top - oStart.top}px)` }],
      { duration: MOVER_O_DUR, delay: MOVER_O_DELAY,
        easing: 'cubic-bezier(0.25,0.46,0.45,0.94)', fill: 'forwards' }
    );

    // ── Animate c (ciaoGhosts[0]) → tgtRects[8] ──
    const cStart = { left: ciaoNatural[0].left + offX, top: ciaoNatural[0].top + offY };
    ciaoGhosts[0].animate(
      [{ transform: 'translate(0,0)' },
       { transform: `translate(${tgtRects[8].left - cStart.left}px,${tgtRects[8].top - cStart.top}px)` }],
      { duration: MOVER_C_DUR, delay: MOVER_C_DELAY,
        easing: 'cubic-bezier(0.25,0.46,0.45,0.94)', fill: 'forwards' }
    );

    // ── Fill in remaining TARGET letters one-by-one left-to-right ──
    // Skip: space=5, i=6 (from ciAo), A=7 (from ciAo), c=8 (mover), o=9 (mover)
    // Also skip L=13 — handled together with L=12 as a single LL ghost so the
    // dlig ligature is visible as soon as the pair appears.
    const placed = new Set([5, 6, 7, 8, 9, 13]);
    const fillGhosts = [];
    TARGET.split('').forEach((ch, i) => {
      if (placed.has(i)) return;
      let ghost;
      if (i === 12) {
        // Combined LL ghost with dlig so the ligature shows during the fill
        ghost = document.createElement('span');
        ghost.textContent = 'LL';
        ghost.style.cssText = [
          'position:fixed',
          `left:${tgtRects[12].left}px`,
          `top:${tgtRects[12].top}px`,
          "font-family:'Catallina',serif",
          `font-size:${stageFS}`,
          'color:#FFA47A',
          'white-space:nowrap',
          'line-height:1',
          'letter-spacing:0',
          'font-feature-settings:"liga" 1,"dlig" 1',
          'pointer-events:none',
          'z-index:200',
          'opacity:0',
        ].join(';');
        document.body.appendChild(ghost);
      } else {
        ghost = makeGhost(ch, tgtRects[i], 0);
        document.body.appendChild(ghost);
      }
      fillGhosts.push(ghost);
    });

    fillGhosts.forEach((ghost, idx) => {
      ghost.animate(
        [{ opacity: 0, transform: 'translateY(8px)' },
         { opacity: 1, transform: 'translateY(0)' }],
        { duration: FILL_DUR, delay: FILL_START + idx * FILL_STEP,
          easing: 'ease-out', fill: 'forwards' }
      );
    });

    // Wait for all animations
    const lastFill  = FILL_START + (fillGhosts.length - 1) * FILL_STEP + FILL_DUR;
    const lastMover = MOVER_C_DELAY + MOVER_C_DUR;
    await wait(Math.max(lastFill, lastMover) + 60);

    // Swap all ghosts → static stage text
    ciaoGhosts.forEach(g => g.remove());
    fillGhosts.forEach(g => g.remove());
    $stage.style.visibility = 'visible';
    fillStage(TARGET, true);

    // Merge the two L spans (indices 12 & 13) so the LL dlig ligature shows in
    // the static stage before and during the phase-2 fly.
    // display:inline overrides the #letter-stage span { inline-block } rule —
    // inline-block creates its own formatting context which blocks ligature
    // formation within the span; inline does not.
    (function () {
      const spans = Array.from($stage.children);
      const llSpan = document.createElement('span');
      llSpan.textContent = 'LL';
      llSpan.style.display = 'inline-block';
      llSpan.style.fontFeatureSettings = '"liga" 1, "dlig" 1';
      llSpan.style.letterSpacing = '0';
      $stage.insertBefore(llSpan, spans[12]);
      spans[12].remove();
      spans[13].remove();
    })();

    // Fade in sublogo
    await wait(160);
    $sub.classList.add('show');
    await wait(600);

    // Auto-advance after pause
    await wait(1000);
    phase2();
  }

  // ── Phase 2: header fly-in ────────────────────────────────────────────────
  async function phase2() {
    // Show real header (logo hidden — overlay animates to its spot)
    $header.classList.add('show');
    $logo.style.visibility = 'hidden';

    await raf2();

    const fromRect = $center.getBoundingClientRect();
    const toRect   = $logo.getBoundingClientRect();

    const stagePx    = parseFloat(getComputedStyle($stage).fontSize);
    const logoPx     = parseFloat(getComputedStyle($logo.querySelector('.logo-name')).fontSize);
    const scale      = logoPx / stagePx;

    // Set intro-sub to the exact size that lands on logo-sub after scaling.
    // Formula: fontSize × scale = logoSubPx  →  fontSize = logoSubPx / scale
    // This is guaranteed correct regardless of any clamp() drift between the
    // two elements' CSS curves.
    const logoSubPx  = parseFloat(getComputedStyle($logo.querySelector('.logo-sub')).fontSize);
    $sub.style.fontSize = (logoSubPx / scale) + 'px';

    // Pin intro-center at its current screen coords
    $center.style.position      = 'fixed';
    $center.style.left          = fromRect.left + 'px';
    $center.style.top           = fromRect.top  + 'px';
    $center.style.margin        = '0';
    $overlay.style.alignItems      = 'unset';
    $overlay.style.justifyContent  = 'unset';

    await raf2();

    const dx = toRect.left - fromRect.left;
    const dy = toRect.top  - fromRect.top;

    const fly = $center.animate(
      [{ transform: 'translate(0,0) scale(1)',                       transformOrigin: 'top left' },
       { transform: `translate(${dx}px,${dy}px) scale(${scale})`,   transformOrigin: 'top left' }],
      { duration: 680, easing: 'cubic-bezier(0.25,0.46,0.45,0.94)', fill: 'forwards' }
    );

    $headerRight.animate(
      [{ opacity: 0 }, { opacity: 1 }],
      { duration: 480, delay: 280, easing: 'ease-out', fill: 'forwards' }
    );

    await fly.finished;

    // Seamless swap to real header
    $logo.style.visibility  = 'visible';
    $headerRight.style.opacity = '1';
    $overlay.style.display  = 'none';

    // Unlock scroll & reveal content
    document.body.style.overflow = '';
    phase3();
  }

  // ── Phase 3: content reveal ────────────────────────────────────────────────
  function phase3() {
    $main.classList.add('show');
    $footer.classList.add('show');
    // Mark animation as seen for this session
    sessionStorage.setItem('introSeen', '1');
  }

  // Skip animation if already seen this session (return nav or refresh)
  if (sessionStorage.getItem('introSeen')) {
    // Jump straight to static header + content
    document.body.style.overflow = '';
    $overlay.style.display = 'none';
    $header.classList.add('show');
    $headerRight.style.opacity = '1';
    phase3();
  } else {
    phase1();
  }
})();
</script>

<button id="back-to-top" aria-label="Back to top">
  <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
    <path d="M12 5l-7 7h4.5v7h5v-7H19z"/>
  </svg>
</button>

<script>
(function () {
  var btn = document.getElementById('back-to-top');
  window.addEventListener('scroll', function () {
    btn.classList.toggle('visible', window.scrollY > 300);
  }, { passive: true });
  btn.addEventListener('click', function () {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });
})();
</script>

</body>
